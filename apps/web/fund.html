<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fund Insight Hub · 基金详情</title>
    <link rel="stylesheet" href="/fund.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="back-link" href="/">返回首页</a>
      <div class="top-meta">
        <span class="top-chip">Fund Detail</span>
        <span class="top-chip" id="detail-time">加载中</span>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero-card">
        <div>
          <p class="eyebrow">Fund Snapshot</p>
          <h1 id="fund-name">基金详情</h1>
          <p id="fund-meta" class="hero-meta">加载中...</p>
          <p id="fund-summary" class="hero-summary"></p>
          <div id="fund-tags" class="tag-row"></div>
        </div>
        <div id="hero-action" class="action-card"></div>
      </section>

      <section class="content-grid">
        <article class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Metrics</p>
              <h2>关键指标</h2>
            </div>
          </div>
          <div id="metric-grid" class="metric-grid"></div>
        </article>

        <article class="panel panel-stack">
          <div>
            <p class="section-kicker">Watchlist</p>
            <h2>观察要点</h2>
          </div>
          <ul id="watch-points" class="bullet-list"></ul>
        </article>
      </section>

      <section class="panel chart-panel">
        <div class="section-head">
          <div>
            <p class="section-kicker">Nav Trend</p>
            <h2>净值走势</h2>
          </div>
        </div>
        <div id="nav-chart"></div>
      </section>

      <section class="content-grid secondary-grid">
        <article class="panel panel-stack">
          <div>
            <p class="section-kicker">Research</p>
            <h2>研究提示</h2>
          </div>
          <ul id="research-highlights" class="bullet-list"></ul>
        </article>

        <article class="panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">Peers</p>
              <h2>相关推荐</h2>
            </div>
          </div>
          <div id="peer-list" class="peer-grid"></div>
        </article>
      </section>
    </main>

    <script src="/fund.js"></script>
  </body>
</html>
