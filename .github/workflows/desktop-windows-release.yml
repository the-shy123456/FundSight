name: Desktop Windows Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      # Opt-in early so we don't get surprised when GitHub Actions switches JavaScript actions to Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/app/src-tauri -> target
            services/analysis_api_rs -> target

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Install desktop deps
        working-directory: apps/desktop/app
        run: npm ci

      - name: Build desktop (Tauri)
        working-directory: apps/desktop/app
        run: npm run tauri build -- --bundles nsis --verbose

      - name: List bundles
        run: |
          dir apps\desktop\app\src-tauri\target\release\bundle /s

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "FundSight Desktop ${{ github.ref_name }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/desktop/app/src-tauri/target/release/bundle/nsis/*.exe
