name: Desktop Windows Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      # Opt-in early so we don't get surprised when GitHub Actions switches JavaScript actions to Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/app/src-tauri -> target
            services/analysis_api_rs -> target

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Install desktop deps
        working-directory: apps/desktop/app
        run: npm ci

      - name: Print toolchain versions
        shell: pwsh
        run: |
          node --version
          npm --version
          rustc -Vv
          cargo -Vv

      - name: Build desktop (Tauri)
        working-directory: apps/desktop/app
        shell: pwsh
        run: |
          npm run tauri build -- --bundles nsis --verbose 2>&1 | Tee-Object -FilePath tauri-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.ref_name }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/desktop/app/tauri-build.log
            apps/desktop/app/src-tauri/target/release/bundle/**
            apps/desktop/app/src-tauri/target/release/build/**/output

      - name: List bundles (debug)
        shell: pwsh
        run: |
          $bundle = "apps/desktop/app/src-tauri/target/release/bundle"
          if (Test-Path $bundle) {
            Get-ChildItem $bundle -Recurse | Select-Object FullName
          } else {
            Write-Host "Bundle directory not found: $bundle"
          }

      - name: Verify NSIS installer exists
        shell: pwsh
        run: |
          $nsis = "apps/desktop/app/src-tauri/target/release/bundle/nsis"
          if (!(Test-Path $nsis)) { throw "NSIS output folder not found: $nsis" }
          $exes = Get-ChildItem $nsis -Filter *.exe -ErrorAction SilentlyContinue
          if ($exes.Count -lt 1) { throw "NSIS installer (.exe) not found in $nsis" }
          Write-Host "Found installers:";
          $exes | Select-Object FullName

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "FundSight Desktop ${{ github.ref_name }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/desktop/app/src-tauri/target/release/bundle/nsis/*.exe
